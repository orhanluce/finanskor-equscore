  <body>
    <script>
      // Apply saved/system theme before paint to avoid flash
      (function () {
        try {
          var t = localStorage.getItem('equscore_theme');
          if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
      // Apply saved language + direction (RTL for Arabic) before paint
      (function () {
        try {
          var l = localStorage.getItem('equscore_lang');
          if (l === 'ar') { document.documentElement.lang = 'ar'; document.documentElement.dir = 'rtl'; }
          else if (l === 'en') { document.documentElement.lang = 'en'; document.documentElement.dir = 'ltr'; }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />

  </body>
